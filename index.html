<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>複数プレイリストUI（右に動画）</title>
<style>
body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }

#sidebar { width: 350px; overflow-y: auto; border-right: 1px solid #ccc; padding: 10px; }
.playlist { margin-bottom: 20px; }
.playlist-title { font-weight: bold; cursor: pointer; margin-bottom: 10px; }
.videos { display: none; margin-left: 10px; }
.video { cursor: pointer; margin: 5px 0; }
.video:hover { text-decoration: underline; }

#player { flex: 1; display: flex; align-items: center; justify-content: center; }
iframe { width: 80%; height: 80%; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="playlist">
    <div class="playlist-title" onclick="toggle('list1')">再生リスト①</div>
    <div class="videos" id="list1"></div>
  </div>

  <div class="playlist">
    <div class="playlist-title" onclick="toggle('list2')">再生リスト②</div>
    <div class="videos" id="list2"></div>
  </div>
</div>

<div id="player">
  <p>動画を選択してください</p>
</div>

<script>
const API_KEY = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";

const playlists = [
  { id: "PLsHj_P-wUyYnbIgioZx3iat9EzihpACzw", elementId: "list1" },
  { id: "PLExT6MVBKs2ByGv9EDeiNSuMZYnFr72Gn", elementId: "list2" }
];

async function loadPlaylist(playlistId, elementId) {
  const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${API_KEY}`);
  const data = await res.json();

  const container = document.getElementById(elementId);

  data.items.forEach(item => {
    const videoId = item.snippet.resourceId.videoId;
    const title = item.snippet.title;

    const div = document.createElement("div");
    div.className = "video";
    div.textContent = "・" + title;
    div.onclick = () => play(videoId);

    container.appendChild(div);
  });
}

function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function play(id) {
  document.getElementById("player").innerHTML = `
    <iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>
  `;
}

playlists.forEach(p => loadPlaylist(p.id, p.elementId));
</script>

</body>
</html>
