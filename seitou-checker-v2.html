<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>正答率チェッカー v2</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #667eea;
      --accent: #764ba2;
      --bg: #f6f7fb;
      --card: #ffffff;
      --muted: #999;
      --success: #28a745;
      --danger: #dc3545;
      --warn: #ff9800;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: "Noto Sans JP", "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }
    
    header {
      padding: 28px 30px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      text-align: center;
    }
    
    header h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    
    header p {
      opacity: 0.95;
      font-size: 0.95rem;
    }
    
    .tabbar {
      display: flex;
      background: #f0f2f6;
      border-bottom: 1px solid #e0e3eb;
    }
    
    .tab-button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: #444;
      transition: all 0.3s ease;
    }
    
    .tab-button:hover {
      background: #fff;
    }
    
    .tab-button.active {
      color: var(--primary);
      background: #fff;
      border-bottom: 3px solid var(--primary);
    }
    
    .content {
      display: none;
      padding: 22px 30px;
    }
    
    .content.active {
      display: block;
    }
    
    .section {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #e6e9ef;
      margin-bottom: 20px;
    }
    
    .section h2 {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #333;
    }
    
    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      margin-bottom: 14px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    
    .form-group input[type="text"],
    .form-group input[type="number"],
    .form-group input[type="email"] {
      padding: 8px 10px;
      border: 1px solid #d7dbe6;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    
    .form-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    
    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    
    .btn:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }
    
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-success {
      background: var(--success);
      color: #fff;
    }
    
    .btn-warn {
      background: var(--warn);
      color: #fff;
    }
    
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .stat-card {
      flex: 1;
      min-width: 140px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }
    
    .stat-card h3 {
      font-size: 0.8rem;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
    }
    
    .grid-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .grid-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 2px solid #e6e9ef;
      background: #fff;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      font-weight: 700;
    }
    
    .grid-cell:hover {
      transform: scale(1.05);
    }
    
    .grid-cell.correct {
      background: linear-gradient(180deg, #e8fff0, #daf7e0);
      border-color: var(--success);
      color: #155724;
    }
    
    .grid-cell.wrong {
      background: linear-gradient(180deg, #ffe8e8, #ffdada);
      border-color: var(--danger);
      color: #721c24;
    }
    
    .grid-cell .num {
      font-size: 1.1rem;
    }
    
    .grid-cell .page {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.8;
    }
    
    .list-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px dashed #e6e9ef;
      align-items: center;
    }
    
    .list-item:last-child {
      border-bottom: none;
    }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-box {
      background: var(--card);
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    
    .modal-title {
      font-weight: 800;
      margin-bottom: 12px;
      color: #333;
    }
    
    .modal-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d7dbe6;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    
    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    
    .empty-message {
      color: var(--muted);
      padding: 20px;
      text-align: center;
      font-style: italic;
    }
    
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.3rem;
      }
      
      .form-grid {
        grid-template-columns: 1fr;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      .btn {
        width: 100%;
      }
      
      .grid-area {
        grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 正答率チェッカー v2</h1>
      <p>完全修正版 — ページ管理・忘却曲線対応</p>
    </header>
    
    <div class="tabbar" role="tablist">
      <button class="tab-button active" data-tab="tab1">📋 基本モード</button>
      <button class="tab-button" data-tab="tab2">📁 フォルダ管理</button>
    </div>
    
    <!-- TAB1 -->
    <div class="content active" id="tab1">
      <div class="section">
        <h2>⚙️ 設定</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>問題セット名</label>
            <input type="text" id="tab1-title" value="問題セット" />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="tab1-use-count" checked />
              問題数指定
            </label>
            <input type="number" id="tab1-count" min="1" value="30" />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="tab1-use-pages" checked />
              ページ管理
            </label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px;">
              <input type="number" id="tab1-start" min="1" value="11" placeholder="開始ページ" />
              <input type="number" id="tab1-end" min="1" value="25" placeholder="終了ページ" />
            </div>
          </div>
          <div class="form-group">
            <label>ページあたりの基本問題数</label>
            <input type="number" id="tab1-per-page" min="1" value="2" />
          </div>
          <div class="form-group">
            <label>ページ別設定（例: 11-15:4,16:3,20:5）</label>
            <input type="text" id="tab1-custom" placeholder="11-15:4,16:3" />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="tab1-skip-enable" />
              飛ばすページ指定
            </label>
            <input type="text" id="tab1-skip" placeholder="例: 41-50,56" disabled />
          </div>
        </div>
      </div>
      
      <div class="button-group">
        <button class="btn btn-primary" id="tab1-apply">✅ 設定を反映</button>
        <button class="btn btn-success" id="tab1-save">💾 結果を記録</button>
        <button class="btn btn-warn" id="tab1-export">📥 エクスポート</button>
        <button class="btn btn-danger" id="tab1-clear">🗑️ 全削除</button>
      </div>
      
      <div class="stats-row">
        <div class="stat-card">
          <h3>全体正答率</h3>
          <div class="stat-value" id="tab1-rate">-</div>
        </div>
        <div class="stat-card">
          <h3>間違い数</h3>
          <div class="stat-value" id="tab1-wrong">-</div>
        </div>
        <div class="stat-card">
          <h3>問題数</h3>
          <div class="stat-value" id="tab1-total">0</div>
        </div>
      </div>
      
      <div class="section">
        <h2>🎯 採点グリッド</h2>
        <div class="grid-area" id="tab1-grid"></div>
      </div>
      
      <div class="section">
        <h2>📊 成績推移</h2>
        <canvas id="tab1-chart" height="80"></canvas>
      </div>
      
      <div class="section">
        <h2>📜 テスト履歴</h2>
        <div id="tab1-history"></div>
      </div>
    </div>
    
    <!-- TAB2 -->
    <div class="content" id="tab2">
      <div style="display: grid; grid-template-columns: 280px 1fr; gap: 16px;">
        <div>
          <div class="section" style="margin-bottom: 0;">
            <h2>📁 フォルダ一覧</h2>
            <div id="tab2-folders" style="max-height: 400px; overflow-y: auto; margin-bottom: 12px;"></div>
            <button class="btn btn-primary" id="tab2-add-folder" style="width: 100%;">+ 新規フォルダ</button>
          </div>
        </div>
        <div>
          <div class="section">
            <h2>⚙️ 設定</h2>
            <div class="form-grid">
              <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" id="tab2-email" placeholder="example@gmail.com" />
              </div>
              <div class="form-group">
                <label>問題セット名</label>
                <input type="text" id="tab2-title" value="フォルダの問題" />
              </div>
              <div class="form-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="tab2-use-count" checked />
                  問題数指定
                </label>
                <input type="number" id="tab2-count" min="1" value="30" />
              </div>
              <div class="form-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="tab2-use-pages" checked />
                  ページ管理
                </label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px;">
                  <input type="number" id="tab2-start" min="1" value="11" placeholder="開始ページ" />
                  <input type="number" id="tab2-end" min="1" value="25" placeholder="終了ページ" />
                </div>
              </div>
            </div>
          </div>
          
          <div class="button-group">
            <button class="btn btn-primary" id="tab2-apply">✅ 設定を反映</button>
            <button class="btn btn-success" id="tab2-save">💾 結果を記録</button>
          </div>
          
          <div class="section">
            <h2>🎯 採点グリッド</h2>
            <div class="grid-area" id="tab2-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-title"></div>
      <input type="text" class="modal-input" id="modal-input" />
      <div class="modal-buttons">
        <button class="btn btn-primary" id="modal-ok">OK</button>
        <button class="btn" id="modal-cancel" style="background: #e6e9ef; color: #333;">キャンセル</button>
      </div>
    </div>
  </div>
  
  <script>
    "use strict";
    
    const STORAGE_KEY = "seitou-checker-v2-data";
    
    let state = {
      tab1: {
        title: "問題セット",
        gridData: [],
        marks: {},
        history: []
      },
      tab2: {
        title: "フォルダの問題",
        gridData: [],
        marks: {},
        history: [],
        folders: [
          { id: 1, name: "数学", children: [{ id: 11, name: "第1章" }, { id: 12, name: "第2章" }] },
          { id: 2, name: "英語", children: [] }
        ],
        email: ""
      }
    };
    
    let chart = null;
    
    // ============ Storage ============
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn("Save failed:", e);
      }
    }
    
    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
        }
      } catch (e) {
        console.warn("Load failed:", e);
      }
    }
    
    // ============ Parser ============
    function parseCustomPages(str) {
      const result = {};
      if (!str) return result;
      
      str.split(",").forEach((part) => {
        const [range, count] = part.trim().split(":").map((s) => s.trim());
        if (!range || !count) return;
        
        const num = parseInt(count, 10);
        if (isNaN(num)) return;
        
        if (range.includes("-")) {
          const [start, end] = range.split("-").map((x) => parseInt(x, 10));
          if (!isNaN(start) && !isNaN(end)) {
            for (let p = Math.min(start, end); p <= Math.max(start, end); p++) {
              result[p] = num;
            }
          }
        } else {
          const p = parseInt(range, 10);
          if (!isNaN(p)) result[p] = num;
        }
      });
      
      return result;
    }
    
    function parseSkipPages(str) {
      const set = new Set();
      if (!str) return set;
      
      str.split(",").forEach((part) => {
        part = part.trim();
        if (!part) return;
        
        if (part.includes("-")) {
          const [start, end] = part.split("-").map((x) => parseInt(x, 10));
          if (!isNaN(start) && !isNaN(end)) {
            for (let p = Math.min(start, end); p <= Math.max(start, end); p++) {
              set.add(p);
            }
          }
        } else {
          const p = parseInt(part, 10);
          if (!isNaN(p)) set.add(p);
        }
      });
      
      return set;
    }
    
    // ============ Grid Generation ============
    function generateGrid(config) {
      const grid = [];
      const customPages = parseCustomPages(config.custom || "");
      const skipPages = parseSkipPages(config.skip || "");
      
      let questionNum = 1;
      
      if (config.usePages) {
        for (let p = config.start; p <= config.end; p++) {
          if (skipPages.has(p)) continue;
          
          const qPerPage = customPages[p] || config.perPage;
          for (let i = 0; i < qPerPage; i++) {
            grid.push({
              id: grid.length,
              number: questionNum++,
              page: p
            });
            
            if (config.useCount && grid.length >= config.count) break;
          }
          
          if (config.useCount && grid.length >= config.count) break;
        }
      } else {
        for (let i = 1; i <= config.count; i++) {
          grid.push({
            id: grid.length,
            number: i,
            page: "-"
          });
        }
      }
      
      return grid;
    }
    
    // ============ Rendering ============
    function renderGrid(domId, gridData, marks, onUpdate) {
      const container = document.getElementById(domId);
      container.innerHTML = "";
      
      if (!gridData || gridData.length === 0) {
        container.innerHTML = '<div class="empty-message">グリッドが空です。設定を反映してください。</div>';
        return;
      }
      
      gridData.forEach((item) => {
        const cell = document.createElement("div");
        cell.className = "grid-cell " + (marks[item.id] ? "wrong" : "correct");
        cell.dataset.id = item.id;
        cell.innerHTML = `
          <div class="num">${item.number}</div>
          <div class="page">p${item.page}</div>
        `;
        
        cell.addEventListener("click", () => {
          if (marks[item.id]) {
            delete marks[item.id];
            cell.classList.remove("wrong");
            cell.classList.add("correct");
          } else {
            marks[item.id] = true;
            cell.classList.remove("correct");
            cell.classList.add("wrong");
          }
          onUpdate && onUpdate();
          saveState();
        });
        
        container.appendChild(cell);
      });
    }
    
    function renderTab1() {
      const data = state.tab1.gridData;
      const marks = state.tab1.marks;
      
      renderGrid("tab1-grid", data, marks, updateTab1Stats);
      updateTab1Stats();
      renderTab1History();
      updateChart();
    }
    
    function updateTab1Stats() {
      const total = state.tab1.gridData.length;
      const wrong = Object.keys(state.tab1.marks).length;
      const rate = total > 0 ? ((total - wrong) / total * 100).toFixed(1) : 0;
      
      document.getElementById("tab1-rate").textContent = total > 0 ? rate + "%" : "-";
      document.getElementById("tab1-wrong").textContent = wrong;
      document.getElementById("tab1-total").textContent = total;
    }
    
    function renderTab1History() {
      const box = document.getElementById("tab1-history");
      const history = state.tab1.history;
      
      if (history.length === 0) {
        box.innerHTML = '<div class="empty-message">履歴はありません</div>';
        return;
      }
      
      box.innerHTML = "";
      [...history].reverse().forEach((record) => {
        const item = document.createElement("div");
        item.className = "list-item";
        item.innerHTML = `
          <div>
            <div style="font-weight: 700;">${record.title}</div>
            <div style="font-size: 0.85rem; color: #666;">${record.date}</div>
          </div>
          <div style="font-weight: 800; color: var(--primary);">${record.rate}%</div>
        `;
        box.appendChild(item);
      });
    }
    
    function renderTab2() {
      const data = state.tab2.gridData;
      const marks = state.tab2.marks;
      renderGrid("tab2-grid", data, marks, null);
      renderTab2Folders();
    }
    
    function renderTab2Folders() {
      const container = document.getElementById("tab2-folders");
      container.innerHTML = "";
      
      state.tab2.folders.forEach((folder) => {
        const folderDiv = document.createElement("div");
        folderDiv.style.padding = "10px";
        folderDiv.style.marginBottom = "6px";
        folderDiv.style.background = "#fff";
        folderDiv.style.borderRadius = "6px";
        folderDiv.style.border = "1px solid #e6e9ef";
        folderDiv.style.cursor = "pointer";
        
        const folderTitle = document.createElement("div");
        folderTitle.style.fontWeight = "700";
        folderTitle.textContent = "📁 " + folder.name;
        folderTitle.style.marginBottom = "6px";
        folderDiv.appendChild(folderTitle);
        
        folderTitle.addEventListener("click", () => {
          document.getElementById("tab2-title").value = folder.name;
        });
        
        if (folder.children && folder.children.length > 0) {
          folder.children.forEach((child) => {
            const childDiv = document.createElement("div");
            childDiv.style.padding = "6px 8px";
            childDiv.style.marginBottom = "4px";
            childDiv.style.marginLeft = "8px";
            childDiv.style.background = "#fafafa";
            childDiv.style.borderRadius = "4px";
            childDiv.style.cursor = "pointer";
            childDiv.textContent = "📄 " + child.name;
            
            childDiv.addEventListener("click", () => {
              document.getElementById("tab2-title").value = child.name;
            });
            
            folderDiv.appendChild(childDiv);
          });
        }
        
        container.appendChild(folderDiv);
      });
    }
    
    function updateChart() {
      const canvas = document.getElementById("tab1-chart");
      if (!canvas) return;
      
      const history = state.tab1.history;
      const labels = history.map((h) => h.date);
      const data = history.map((h) => Number(h.rate) || 0);
      
      if (!chart) {
        chart = new Chart(canvas, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "正答率 (%)",
                data,
                borderColor: "var(--primary)",
                backgroundColor: "rgba(102, 126, 234, 0.1)",
                borderWidth: 2,
                tension: 0.4,
                fill: true
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: {
                beginAtZero: true,
                max: 100
              }
            }
          }
        });
      } else {
        chart.data.labels = labels;
        chart.data.datasets[0].data = data;
        chart.update();
      }
    }
    
    // ============ Actions ============
    function applyTab1() {
      if (!confirm("現在の採点結果を消して新しく生成しますか？")) return;
      
      const config = {
        useCount: document.getElementById("tab1-use-count").checked,
        usePages: document.getElementById("tab1-use-pages").checked,
        count: parseInt(document.getElementById("tab1-count").value, 10) || 30,
        start: parseInt(document.getElementById("tab1-start").value, 10) || 1,
        end: parseInt(document.getElementById("tab1-end").value, 10) || 1,
        perPage: parseInt(document.getElementById("tab1-per-page").value, 10) || 1,
        custom: document.getElementById("tab1-custom").value.trim(),
        skip: document.getElementById("tab1-skip-enable").checked
          ? document.getElementById("tab1-skip").value.trim()
          : ""
      };
      
      state.tab1.title = document.getElementById("tab1-title").value || state.tab1.title;
      state.tab1.gridData = generateGrid(config);
      state.tab1.marks = {};
      saveState();
      renderTab1();
    }
    
    function saveTab1Result() {
      const title = document.getElementById("tab1-title").value || "無題";
      const total = state.tab1.gridData.length;
      const wrong = Object.keys(state.tab1.marks).length;
      const rate = total > 0 ? ((total - wrong) / total * 100).toFixed(1) : 0;
      
      const record = {
        date: new Date().toLocaleString("ja-JP"),
        title,
        total,
        wrong,
        rate: Number(rate)
      };
      
      state.tab1.history.push(record);
      saveState();
      renderTab1History();
      updateChart();
      alert(`✅ 記録しました: ${rate}%`);
    }
    
    function clearTab1() {
      if (!confirm("📜 全データを削除しますか？")) return;
      state.tab1.history = [];
      state.tab1.marks = {};
      state.tab1.gridData = [];
      saveState();
      renderTab1();
      alert("✅ 削除しました");
    }
    
    function exportTab1Data() {
      const data = JSON.stringify(state.tab1.history, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "seitou-history-" + new Date().getTime() + ".json";
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function applyTab2() {
      if (!confirm("現在の採点結果を消して新しく生成しますか？")) return;
      
      const config = {
        useCount: document.getElementById("tab2-use-count").checked,
        usePages: document.getElementById("tab2-use-pages").checked,
        count: parseInt(document.getElementById("tab2-count").value, 10) || 30,
        start: parseInt(document.getElementById("tab2-start").value, 10) || 1,
        end: parseInt(document.getElementById("tab2-end").value, 10) || 1,
        perPage: 2,
        custom: "",
        skip: ""
      };
      
      state.tab2.title = document.getElementById("tab2-title").value || state.tab2.title;
      state.tab2.gridData = generateGrid(config);
      state.tab2.marks = {};
      saveState();
      renderTab2();
    }
    
    function saveTab2Result() {
      const title = document.getElementById("tab2-title").value || "無題";
      const total = state.tab2.gridData.length;
      const wrong = Object.keys(state.tab2.marks).length;
      const rate = total > 0 ? ((total - wrong) / total * 100).toFixed(1) : 0;
      
      const record = {
        date: new Date().toLocaleString("ja-JP"),
        title,
        total,
        wrong,
        rate: Number(rate)
      };
      
      state.tab2.history.push(record);
      state.tab2.email = document.getElementById("tab2-email").value.trim();
      saveState();
      alert(`✅ 記録しました: ${rate}%`);
    }
    
    function addFolder() {
      showModal("新規フォルダ名", "フォルダ名を入力", (name) => {
        if (!name) return;
        state.tab2.folders.push({
          id: Date.now(),
          name,
          children: []
        });
        saveState();
        renderTab2Folders();
        document.getElementById("tab2-title").value = name;
      });
    }
    
    // ============ Modal ============
    function showModal(title, placeholder, callback) {
      const modal = document.getElementById("modal");
      document.getElementById("modal-title").textContent = title;
      const input = document.getElementById("modal-input");
      input.value = "";
      input.placeholder = placeholder;
      modal.classList.add("active");
      input.focus();
      
      const ok = document.getElementById("modal-ok");
      const cancel = document.getElementById("modal-cancel");
      
      const onOk = () => {
        const value = input.value.trim();
        cleanup();
        callback && callback(value);
      };
      
      const onCancel = () => {
        cleanup();
      };
      
      const cleanup = () => {
        ok.removeEventListener("click", onOk);
        cancel.removeEventListener("click", onCancel);
        input.removeEventListener("keydown", onKeyDown);
        modal.classList.remove("active");
      };
      
      const onKeyDown = (e) => {
        if (e.key === "Enter") onOk();
        if (e.key === "Escape") onCancel();
      };
      
      ok.addEventListener("click", onOk);
      cancel.addEventListener("click", onCancel);
      input.addEventListener("keydown", onKeyDown);
    }
    
    // ============ Init ============
    function init() {
      loadState();
      
      // Tab switching
      document.querySelectorAll(".tab-button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const tabId = btn.dataset.tab;
          
          document.querySelectorAll(".tab-button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          
          document.querySelectorAll(".content").forEach((c) => c.classList.remove("active"));
          document.getElementById(tabId).classList.add("active");
        });
      });
      
      // Tab1 events
      document.getElementById("tab1-apply").addEventListener("click", applyTab1);
      document.getElementById("tab1-save").addEventListener("click", saveTab1Result);
      document.getElementById("tab1-clear").addEventListener("click", clearTab1);
      document.getElementById("tab1-export").addEventListener("click", exportTab1Data);
      
      const skipCheckbox = document.getElementById("tab1-skip-enable");
      skipCheckbox.addEventListener("change", () => {
        document.getElementById("tab1-skip").disabled = !skipCheckbox.checked;
      });
      
      // Tab2 events
      document.getElementById("tab2-apply").addEventListener("click", applyTab2);
      document.getElementById("tab2-save").addEventListener("click", saveTab2Result);
      document.getElementById("tab2-add-folder").addEventListener("click", addFolder);
      
      document.getElementById("tab2-email").addEventListener("change", () => {
        state.tab2.email = document.getElementById("tab2-email").value.trim();
        saveState();
      });
      
      // Initialize values
      document.getElementById("tab1-title").value = state.tab1.title;
      document.getElementById("tab2-title").value = state.tab2.title;
      document.getElementById("tab2-email").value = state.tab2.email;
      
      // Initial render
      if (!state.tab1.gridData.length) applyTab1();
      else renderTab1();
      
      if (!state.tab2.gridData.length) applyTab2();
      else renderTab2();
      
      updateChart();
      window.addEventListener("beforeunload", saveState);
    }
    
    init();
  </script>
</body>
</html>
