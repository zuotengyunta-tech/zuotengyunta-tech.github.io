<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>正答率チェッカー v2</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #667eea;
      --accent: #764ba2;
      --bg: #f6f7fb;
      --card: #ffffff;
      --muted: #999;
      --success: #28a745;
      --danger: #dc3545;
      --warn: #ff9800;
      --info: #17a2b8;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: "Noto Sans JP", "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }
    
    header {
      padding: 28px 30px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      text-align: center;
    }
    
    header h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    
    header p {
      opacity: 0.95;
      font-size: 0.95rem;
    }
    
    .tabbar {
      display: flex;
      background: #f0f2f6;
      border-bottom: 1px solid #e0e3eb;
    }
    
    .tab-button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: #444;
      transition: all 0.3s ease;
    }
    
    .tab-button:hover {
      background: #fff;
    }
    
    .tab-button.active {
      color: var(--primary);
      background: #fff;
      border-bottom: 3px solid var(--primary);
    }
    
    .content {
      display: none;
      padding: 22px 30px;
    }
    
    .content.active {
      display: block;
    }
    
    .section {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #e6e9ef;
      margin-bottom: 20px;
    }
    
    .section h2 {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #333;
    }
    
    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      margin-bottom: 14px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    
    .form-group input[type="text"],
    .form-group input[type="number"],
    .form-group input[type="email"],
    .form-group input[type="date"],
    .form-group textarea {
      padding: 8px 10px;
      border: 1px solid #d7dbe6;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    
    .form-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    
    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    
    .btn:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }
    
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-success {
      background: var(--success);
      color: #fff;
    }
    
    .btn-warn {
      background: var(--warn);
      color: #fff;
    }
    
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    
    .btn-info {
      background: var(--info);
      color: #fff;
    }
    
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .stat-card {
      flex: 1;
      min-width: 140px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }
    
    .stat-card h3 {
      font-size: 0.8rem;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
    }
    
    .grid-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .grid-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 2px solid #e6e9ef;
      background: #fff;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      font-weight: 700;
    }
    
    .grid-cell:hover {
      transform: scale(1.05);
    }
    
    .grid-cell.correct {
      background: linear-gradient(180deg, #e8fff0, #daf7e0);
      border-color: var(--success);
      color: #155724;
    }
    
    .grid-cell.wrong {
      background: linear-gradient(180deg, #ffe8e8, #ffdada);
      border-color: var(--danger);
      color: #721c24;
    }
    
    .grid-cell .num {
      font-size: 1.1rem;
    }
    
    .grid-cell .page {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.8;
    }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-box {
      background: var(--card);
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-title {
      font-weight: 800;
      margin-bottom: 16px;
      color: #333;
      font-size: 1.1rem;
    }
    
    .modal-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d7dbe6;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    
    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    
    .empty-message {
      color: var(--muted);
      padding: 20px;
      text-align: center;
      font-style: italic;
    }
    
    /* ドラッグ&ドロップ表示 */
    .drag-drop-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      min-height: 600px;
    }
    
    .history-panel {
      background: #f8f9fa;
      border: 2px solid #e6e9ef;
      border-radius: 10px;
      padding: 16px;
      overflow-y: auto;
    }
    
    .history-panel h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #333;
    }
    
    .history-item {
      background: #fff;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      border-left: 3px solid var(--primary);
      cursor: grab;
      transition: all 0.2s ease;
      user-select: none;
    }
    
    .history-item:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .history-item.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }
    
    .history-item-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: #333;
      margin-bottom: 4px;
    }
    
    .history-item-meta {
      font-size: 0.75rem;
      color: #999;
      margin-bottom: 4px;
    }
    
    .history-item-rate {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    /* フォルダパネル */
    .folder-panel {
      background: #f8f9fa;
      border: 2px solid #e6e9ef;
      border-radius: 10px;
      padding: 16px;
      overflow-y: auto;
      min-height: 400px;
    }
    
    .folder-panel h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #333;
    }
    
    .folder-item {
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #e6e9ef;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    
    .folder-item:hover {
      background: #f0f0f0;
    }
    
    .folder-item.drop-zone {
      background: #e8f4ff;
      border-color: var(--primary);
      border: 2px dashed var(--primary);
    }
    
    .folder-name {
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
    }
    
    .folder-count {
      font-size: 0.75rem;
      color: #999;
    }
    
    /* スケジュール機能 */
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #fff;
    }
    
    .schedule-table th {
      background: #f0f2f6;
      padding: 10px;
      text-align: left;
      font-weight: 700;
      border-bottom: 2px solid #d7dbe6;
      font-size: 0.85rem;
    }
    
    .schedule-table td {
      padding: 10px;
      border-bottom: 1px solid #e6e9ef;
      font-size: 0.9rem;
    }
    
    .schedule-table tr:hover {
      background: #f8f9fa;
    }
    
    .schedule-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    
    .badge-1day { background: #fff3cd; color: #856404; }
    .badge-7day { background: #cfe2ff; color: #084298; }
    .badge-16day { background: #d1ecf1; color: #0c5460; }
    .badge-35day { background: #d5edda; color: #155724; }
    .badge-62day { background: #f8d7da; color: #721c24; }
    
    .record-stored-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      background: #d1ecf1;
      color: #0c5460;
    }
    
    @media (max-width: 1024px) {
      .drag-drop-container {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.3rem;
      }
      
      .form-grid {
        grid-template-columns: 1fr;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      .btn {
        width: 100%;
      }
      
      .grid-area {
        grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 正答率チェッカー v2 - 拡張版</h1>
      <p>履歴割り振り・忘却曲線・スマートスケジューリング対応</p>
    </header>
    
    <div class="tabbar" role="tablist">
      <button class="tab-button active" data-tab="tab1">📋 基本モード</button>
      <button class="tab-button" data-tab="tab2">📁 フォルダ管理</button>
      <button class="tab-button" data-tab="tab3">📅 テスト履歴割り振り</button>
    </div>
    
    <!-- TAB1 基本モード -->
    <div class="content active" id="tab1">
      <div class="section">
        <h2>⚙️ 設定</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>問題セット名</label>
            <input type="text" id="tab1-title" value="問題セット" />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="tab1-use-count" checked />
              問題数指定
            </label>
            <input type="number" id="tab1-count" min="1" value="30" />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="tab1-use-pages" checked />
              ページ管理
            </label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px;">
              <input type="number" id="tab1-start" min="1" value="11" placeholder="開始ページ" />
              <input type="number" id="tab1-end" min="1" value="25" placeholder="終了ページ" />
            </div>
          </div>
          <div class="form-group">
            <label>各ページの問題数</label>
            <input type="number" id="tab1-per-page" min="1" value="2" />
          </div>
        </div>
      </div>
      
      <div class="button-group">
        <button class="btn btn-primary" id="tab1-apply">✅ 設定を反映</button>
        <button class="btn btn-success" id="tab1-save">💾 結果を記録</button>
        <button class="btn btn-warn" id="tab1-export">📥 エクスポート</button>
        <button class="btn btn-danger" id="tab1-clear">🗑️ 全削除</button>
      </div>
      
      <div class="stats-row">
        <div class="stat-card">
          <h3>全体正答率</h3>
          <div class="stat-value" id="tab1-rate">-</div>
        </div>
        <div class="stat-card">
          <h3>間違い数</h3>
          <div class="stat-value" id="tab1-wrong">-</div>
        </div>
        <div class="stat-card">
          <h3>問題数</h3>
          <div class="stat-value" id="tab1-total">0</div>
        </div>
      </div>
      
      <div class="section">
        <h2>🎯 採点グリッド</h2>
        <div class="grid-area" id="tab1-grid"></div>
      </div>
      
      <div class="section">
        <h2>📊 成績推移</h2>
        <canvas id="tab1-chart" height="80"></canvas>
      </div>
    </div>
    
    <!-- TAB2 フォルダ管理 -->
    <div class="content" id="tab2">
      <div class="section">
        <h2>📁 フォルダ管理</h2>
        <div class="button-group">
          <button class="btn btn-primary" id="tab2-add-folder">+ 新規フォルダ</button>
          <button class="btn btn-success" id="tab2-save-email">💾 メール設定を保存</button>
        </div>
        
        <div class="form-grid">
          <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="tab2-email" placeholder="example@gmail.com" />
          </div>
        </div>
      </div>
      
      <div class="section">
        <div id="tab2-folders-container"></div>
      </div>
    </div>
    
    <!-- TAB3 テスト履歴割り振り -->
    <div class="content" id="tab3">
      <div class="section">
        <h2>📜 テスト履歴割り振り</h2>
        <p style="margin-bottom: 16px; color: #666; font-size: 0.9rem;">履歴から記録をドラッグしてフォルダに持っていきます。自動スケジュール設定も可能です。</p>
        
        <div class="button-group">
          <label class="checkbox-label">
            <input type="checkbox" id="tab3-auto-schedule" checked />
            忘却曲線に基づいて自動スケジュール設定
          </label>
        </div>
        
        <div class="drag-drop-container" id="tab3-drag-drop"></div>
      </div>
      
      <div class="section">
        <h2>📅 スケジュール一覧</h2>
        <table class="schedule-table" id="tab3-schedule-table">
          <thead>
            <tr>
              <th>記録名</th>
              <th>日程</th>
              <th>状態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tab3-schedule-body">
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <!-- MODAL: フォルダ作成 -->
  <div class="modal" id="modal-folder">
    <div class="modal-box">
      <div class="modal-title">📁 新規フォルダ</div>
      <input type="text" class="modal-input" id="modal-folder-name" placeholder="フォルダ名を入力" />
      <div class="modal-buttons">
        <button class="btn btn-primary" id="modal-folder-ok">作成</button>
        <button class="btn" id="modal-folder-cancel" style="background: #e6e9ef; color: #333;">キャンセル</button>
      </div>
    </div>
  </div>
  
  <!-- MODAL: 記録名入力 -->
  <div class="modal" id="modal-record-name">
    <div class="modal-box">
      <div class="modal-title">📝 記録名を入力</div>
      <input type="text" class="modal-input" id="modal-record-input" placeholder="例: 2024年7月 実力テスト" />
      <div class="modal-buttons">
        <button class="btn btn-primary" id="modal-record-ok">保存</button>
        <button class="btn" id="modal-record-cancel" style="background: #e6e9ef; color: #333;">キャンセル</button>
      </div>
    </div>
  </div>
  
  <script>
    "use strict";
    
    const STORAGE_KEY = "seitou-checker-v3-data";
    
    let state = {
      tab1: {
        title: "問題セット",
        gridData: [],
        marks: {},
        history: []
      },
      tab2: {
        folders: [
          { id: 1, name: "数学", records: [] },
          { id: 2, name: "英語", records: [] }
        ],
        email: ""
      },
      tab3: {
        schedules: []
      }
    };
    
    let chart = null;
    let draggedRecord = null;
    
    // ============ Storage ============
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn("Save failed:", e);
      }
    }
    
    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
        }
      } catch (e) {
        console.warn("Load failed:", e);
      }
    }
    
    // ============ UUID生成 ============
    function generateId() {
      return Date.now() + "-" + Math.random().toString(36).substr(2, 9);
    }
    
    // ============ 忘却曲線スケジュール計算 ============
    function calculateSpacedRepetitionSchedule(baseDate) {
      const intervals = [1, 7, 16, 35, 62]; // 日数
      const schedules = [];
      
      intervals.forEach((days) => {
        const date = new Date(baseDate);
        date.setDate(date.getDate() + days);
        schedules.push({
          date: formatDate(date),
          days: days,
          label: days === 1 ? "1日後" : `${days}日後`
        });
      });
      
      return schedules;
    }
    
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }
    
    // ============ TAB1: 基本モード ============
    function generateGrid(config) {
      const grid = [];
      let questionNum = 1;
      
      if (config.usePages) {
        for (let p = config.start; p <= config.end; p++) {
          const qPerPage = config.perPage;
          for (let i = 0; i < qPerPage; i++) {
            grid.push({
              id: grid.length,
              number: questionNum++,
              page: p
            });
            
            if (config.useCount && grid.length >= config.count) break;
          }
          
          if (config.useCount && grid.length >= config.count) break;
        }
      } else {
        for (let i = 1; i <= config.count; i++) {
          grid.push({
            id: grid.length,
            number: i,
            page: "-"
          });
        }
      }
      
      return grid;
    }
    
    function renderGrid() {
      const container = document.getElementById("tab1-grid");
      container.innerHTML = "";
      
      const data = state.tab1.gridData;
      const marks = state.tab1.marks;
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-message">グリッドが空です。設定を反映してください。</div>';
        return;
      }
      
      data.forEach((item) => {
        const cell = document.createElement("div");
        cell.className = "grid-cell " + (marks[item.id] ? "wrong" : "correct");
        cell.dataset.id = item.id;
        cell.innerHTML = `
          <div class="num">${item.number}</div>
          <div class="page">p${item.page}</div>
        `;
        
        cell.addEventListener("click", () => {
          if (marks[item.id]) {
            delete marks[item.id];
            cell.classList.remove("wrong");
            cell.classList.add("correct");
          } else {
            marks[item.id] = true;
            cell.classList.remove("correct");
            cell.classList.add("wrong");
          }
          updateTab1Stats();
          saveState();
        });
        
        container.appendChild(cell);
      });
    }
    
    function updateTab1Stats() {
      const total = state.tab1.gridData.length;
      const wrong = Object.keys(state.tab1.marks).length;
      const rate = total > 0 ? ((total - wrong) / total * 100).toFixed(1) : 0;
      
      document.getElementById("tab1-rate").textContent = total > 0 ? rate + "%" : "-";
      document.getElementById("tab1-wrong").textContent = wrong;
      document.getElementById("tab1-total").textContent = total;
    }
    
    document.getElementById("tab1-apply").addEventListener("click", () => {
      const config = {
        useCount: document.getElementById("tab1-use-count").checked,
        count: parseInt(document.getElementById("tab1-count").value) || 30,
        usePages: document.getElementById("tab1-use-pages").checked,
        start: parseInt(document.getElementById("tab1-start").value) || 11,
        end: parseInt(document.getElementById("tab1-end").value) || 25,
        perPage: parseInt(document.getElementById("tab1-per-page").value) || 2
      };
      
      state.tab1.gridData = generateGrid(config);
      state.tab1.marks = {};
      renderGrid();
      updateTab1Stats();
      saveState();
      alert("設定が反映されました！");
    });
    
    document.getElementById("tab1-save").addEventListener("click", () => {
      const title = document.getElementById("tab1-title").value || "記録";
      document.getElementById("modal-record-input").value = title + " " + formatDate(new Date());
      document.getElementById("modal-record-name").classList.add("active");
    });
    
    document.getElementById("modal-record-ok").addEventListener("click", () => {
      const title = document.getElementById("modal-record-input").value || "記録";
      const total = state.tab1.gridData.length;
      const wrong = Object.keys(state.tab1.marks).length;
      const rate = total > 0 ? ((total - wrong) / total * 100).toFixed(1) : 0;
      
      const record = {
        id: generateId(),
        title: title,
        date: formatDate(new Date()),
        total: total,
        wrong: wrong,
        rate: rate,
        gridData: JSON.parse(JSON.stringify(state.tab1.gridData)),
        marks: JSON.parse(JSON.stringify(state.tab1.marks))
      };
      
      state.tab1.history.push(record);
      state.tab1.marks = {};
      renderGrid();
      
      document.getElementById("modal-record-name").classList.remove("active");
      saveState();
      alert("記録が保存されました！");
    });
    
    document.getElementById("modal-record-cancel").addEventListener("click", () => {
      document.getElementById("modal-record-name").classList.remove("active");
    });
    
    document.getElementById("tab1-clear").addEventListener("click", () => {
      if (confirm("全データを削除しますか？")) {
        state.tab1 = { title: "問題セット", gridData: [], marks: {}, history: [] };
        renderGrid();
        updateTab1Stats();
        saveState();
        alert("全データが削除されました");
      }
    });
    
    // ============ TAB2: フォルダ管理 ============
    function renderTab2() {
      const container = document.getElementById("tab2-folders-container");
      container.innerHTML = "";
      
      state.tab2.folders.forEach((folder) => {
        const folderDiv = document.createElement("div");
        folderDiv.style.marginBottom = "20px";
        
        const header = document.createElement("div");
        header.style.cssText = "font-weight: 700; margin-bottom: 8px; color: #333;";
        header.textContent = `📁 ${folder.name} (${folder.records.length} 件)`;
        folderDiv.appendChild(header);
        
        const list = document.createElement("div");
        if (folder.records.length === 0) {
          list.innerHTML = '<div class="empty-message">記録はありません</div>';
        } else {
          folder.records.forEach((record) => {
            const item = document.createElement("div");
            item.style.cssText = "background: #fff; padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid var(--primary);";
            item.innerHTML = `
              <div style="font-weight: 700; color: #333;">${record.title}</div>
              <div style="font-size: 0.85rem; color: #666; margin-top: 4px;">${record.date} | 正答率: ${record.rate}%</div>
            `;
            list.appendChild(item);
          });
        }
        folderDiv.appendChild(list);
        container.appendChild(folderDiv);
      });
    }
    
    document.getElementById("tab2-add-folder").addEventListener("click", () => {
      document.getElementById("modal-folder-name").value = "";
      document.getElementById("modal-folder").classList.add("active");
    });
    
    document.getElementById("modal-folder-ok").addEventListener("click", () => {
      const name = document.getElementById("modal-folder-name").value.trim();
      if (name) {
        state.tab2.folders.push({
          id: generateId(),
          name: name,
          records: []
        });
        document.getElementById("modal-folder").classList.remove("active");
        renderTab2();
        saveState();
      }
    });
    
    document.getElementById("modal-folder-cancel").addEventListener("click", () => {
      document.getElementById("modal-folder").classList.remove("active");
    });
    
    document.getElementById("tab2-save-email").addEventListener("click", () => {
      const email = document.getElementById("tab2-email").value.trim();
      state.tab2.email = email;
      saveState();
      alert("メールアドレスが保存されました");
    });
    
    // ============ TAB3: テスト履歴割り振り ============
    function renderTab3() {
      const container = document.getElementById("tab3-drag-drop");
      container.innerHTML = "";
      
      // 左パネル: 履歴
      const leftPanel = document.createElement("div");
      leftPanel.className = "history-panel";
      leftPanel.innerHTML = "<h3>📜 テスト履歴</h3>";
      
      const historyList = document.createElement("div");
      if (state.tab1.history.length === 0) {
        historyList.innerHTML = '<div class="empty-message">記録がありません</div>';
      } else {
        state.tab1.history.forEach((record) => {
          const item = document.createElement("div");
          item.className = "history-item";
          item.draggable = true;
          item.dataset.recordId = record.id;
          item.innerHTML = `
            <div class="history-item-title">${record.title}</div>
            <div class="history-item-meta">${record.date}</div>
            <div class="history-item-rate">正答率: ${record.rate}%</div>
          `;
          
          item.addEventListener("dragstart", (e) => {
            draggedRecord = record;
            item.classList.add("dragging");
          });
          
          item.addEventListener("dragend", () => {
            item.classList.remove("dragging");
            draggedRecord = null;
          });
          
          historyList.appendChild(item);
        });
      }
      leftPanel.appendChild(historyList);
      container.appendChild(leftPanel);
      
      // 右パネル: フォルダ
      const rightPanel = document.createElement("div");
      rightPanel.className = "folder-panel";
      rightPanel.innerHTML = "<h3>📁 フォルダを選択</h3>";
      
      const folderList = document.createElement("div");
      state.tab2.folders.forEach((folder) => {
        const folderItem = document.createElement("div");
        folderItem.className = "folder-item";
        folderItem.dataset.folderId = folder.id;
        folderItem.innerHTML = `
          <div class="folder-name">${folder.name}</div>
          <div class="folder-count">保存済み: ${folder.records.length} 件</div>
        `;
        
        folderItem.addEventListener("dragover", (e) => {
          e.preventDefault();
          folderItem.classList.add("drop-zone");
        });
        
        folderItem.addEventListener("dragleave", () => {
          folderItem.classList.remove("drop-zone");
        });
        
        folderItem.addEventListener("drop", () => {
          folderItem.classList.remove("drop-zone");
          
          if (!draggedRecord) return;
          
          // 重複チェック
          if (folder.records.some(r => r.id === draggedRecord.id)) {
            alert("この記録は既にこのフォルダに保存されています");
            return;
          }
          
          // 記録をコピーしてフォルダに追加
          const recordCopy = JSON.parse(JSON.stringify(draggedRecord));
          folder.records.push(recordCopy);
          
          // 自動スケジュール設定
          if (document.getElementById("tab3-auto-schedule").checked) {
            const schedules = calculateSpacedRepetitionSchedule(new Date(draggedRecord.date));
            schedules.forEach((schedule) => {
              const existing = state.tab3.schedules.find(
                s => s.date === schedule.date && s.recordId === draggedRecord.id
              );
              if (!existing) {
                state.tab3.schedules.push({
                  id: generateId(),
                  recordId: draggedRecord.id,
                  recordTitle: draggedRecord.title,
                  date: schedule.date,
                  label: schedule.label,
                  days: schedule.days,
                  sent: false
                });
              }
            });
          }
          
          renderTab3();
          renderTab2();
          saveState();
          alert(`記録を「${folder.name}」に保存しました！`);
        });
        
        folderList.appendChild(folderItem);
      });
      rightPanel.appendChild(folderList);
      container.appendChild(rightPanel);
    }
    
    function renderTab3ScheduleTable() {
      const tbody = document.getElementById("tab3-schedule-body");
      tbody.innerHTML = "";
      
      // 日付でソート
      const sorted = [...state.tab3.schedules].sort((a, b) => new Date(a.date) - new Date(b.date));
      
      sorted.forEach((schedule) => {
        const tr = document.createElement("tr");
        
        const recordNameCell = document.createElement("td");
        recordNameCell.textContent = schedule.recordTitle;
        tr.appendChild(recordNameCell);
        
        const dateCell = document.createElement("td");
        dateCell.textContent = `${schedule.date} (${schedule.label})`;
        tr.appendChild(dateCell);
        
        const statusCell = document.createElement("td");
        statusCell.innerHTML = schedule.sent 
          ? '<span class="record-stored-badge">送信済み</span>'
          : '<span class="schedule-badge badge-' + 
            (schedule.days === 1 ? '1day' : schedule.days === 7 ? '7day' : 
             schedule.days === 16 ? '16day' : schedule.days === 35 ? '35day' : '62day') + 
            '">' + schedule.label + '</span>';
        tr.appendChild(statusCell);
        
        const actionCell = document.createElement("td");
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn btn-danger";
        deleteBtn.style.padding = "4px 8px";
        deleteBtn.style.fontSize = "0.8rem";
        deleteBtn.textContent = "削除";
        deleteBtn.addEventListener("click", () => {
          state.tab3.schedules = state.tab3.schedules.filter(s => s.id !== schedule.id);
          renderTab3ScheduleTable();
          saveState();
        });
        actionCell.appendChild(deleteBtn);
        tr.appendChild(actionCell);
        
        tbody.appendChild(tr);
      });
    }
    
    // ============ タブ切り替え ============
    document.querySelectorAll(".tab-button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const tabId = btn.dataset.tab;
        
        document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
        
        btn.classList.add("active");
        document.getElementById(tabId).classList.add("active");
        
        if (tabId === "tab2") renderTab2();
        if (tabId === "tab3") {
          renderTab3();
          renderTab3ScheduleTable();
        }
      });
    });
    
    // ============ 初期化 ============
    loadState();
    renderGrid();
    updateTab1Stats();
  </script>
</body>
</html>
